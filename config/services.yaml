services:
  _defaults:
    autowire: true
    autoconfigure: true

  Symfinity\UxBlocksExtended\:
    resource: '../src/'
    exclude:
      - '../src/SymfinityUxBlocksExtendedBundle.php'
      - '../src/DependencyInjection/'

  Symfinity\UxBlocksExtended\Controller\CatalogController:
    tags: ['controller.service_arguments']

  Symfinity\UxBlocksExtended\Css\BlocksExtendedCssProvider:
    arguments:
      $packageDir: '%ux_blocks_extended.package_dir%'
