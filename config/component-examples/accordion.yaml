role: accordion
twig_name: Accordion
examples:
  - id: faq-single
    title: FAQ (single open)
    section: Examples
    props:
      type: single
    slot_twig: |
      <details open name="handbook-accordion-faq">
          <summary><span class="ux-accordion-label">What is ux-blocks?</span></summary>
          <p>Composable Symfony UX blocks with kernel-driven themes and closed role registries.</p>
      </details>
      <details name="handbook-accordion-faq">
          <summary><span class="ux-accordion-label">How do handbook previews work?</span></summary>
          <p>Each example renders live Twig in the host app with the active UI Kernel theme.</p>
      </details>
      <details name="handbook-accordion-faq">
          <summary><span class="ux-accordion-label">Can I switch themes?</span></summary>
          <p>Yes — tokens recompile from the active theme profile.</p>
      </details>
  - id: type-multiple
    title: Multiple panels open
    section: Behavior
    props:
      type: multiple
    slot_twig: |
      <details open name="handbook-accordion-multi-a">
          <summary><span class="ux-accordion-label">Billing</span></summary>
          <p>Update payment method and invoices.</p>
      </details>
      <details open name="handbook-accordion-multi-b">
          <summary><span class="ux-accordion-label">Notifications</span></summary>
          <p>Choose email and in-app alerts.</p>
      </details>
