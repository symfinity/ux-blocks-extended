role: alert
twig_name: Alert
examples:
  - id: info
    title: Information
    section: Variants
    props:
      variant: info
      title: Heads up
    slot_text: New themes are available in the catalog.
  - id: success
    title: Success
    section: Variants
    props:
      variant: success
      title: Saved
    slot_text: Your changes were applied.
  - id: warning-dismiss
    title: Dismissible warning
    section: Variants
    props:
      variant: warning
      dismissible: true
    slot_text: Scheduled maintenance tonight at 22:00 UTC.
  - id: danger
    title: Error
    section: Variants
    props:
      variant: danger
      title: Could not save
    slot_text: Check the highlighted fields and try again.
