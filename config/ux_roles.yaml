    interaction: nat
    stage: A
    status: shipped
  - role: app-shell
    twig_component: AppShell
    php_class: Symfinity\UxBlocksExtended\Twig\Components\AppShell
    fragment_id: blocks.ext.app-shell
    fragment_pattern: "blocks.ext.app-shell.{n}"
    attributes: [variant, density, open]
    styled_parts: [aside, header]
    composition_language: enforced
    interaction: nat
    stage: A
    status: shipped
  - role: page-header
    twig_component: PageHeader
    php_class: Symfinity\UxBlocksExtended\Twig\Components\PageHeader
    fragment_id: blocks.ext.page-header
    fragment_pattern: "blocks.ext.page-header.{n}"
    scalar_content: [title, description]
    styled_parts: [header, actions]
    composition_language: enforced
    interaction: nat
    stage: A
    status: shipped
  - role: search-form
    twig_component: SearchForm
    php_class: Symfinity\UxBlocksExtended\Twig\Components\SearchForm
    fragment_id: blocks.ext.search-form
    fragment_pattern: "blocks.ext.search-form.{n}"
    interaction: nat
    stage: A
    status: shipped
